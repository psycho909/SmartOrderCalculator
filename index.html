<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智慧單懶人計算器</title>
  <style>
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, sans-serif;
    }
    /* 隱藏數字輸入框的上下箭頭 */
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
      -webkit-appearance: none; 
      margin: 0; 
    }
  </style>
</head>
<body>

  <div id="app" style="padding: 1rem; max-width: 480px; margin: 0 auto;">
    <div style="margin-bottom: 1.2rem;">
      <div style="font-size: 18px; font-weight: 700; color: #111; letter-spacing: -0.3px;">智慧單懶人計算器</div>
      <div style="font-size: 12px; color: #6B7280; margin-top: 3px;">輸入昨日收盤價 → 自動產生所有設定，直接抄去大戶投</div>
    </div>

    <div style="background: #F9FAFB; border-radius: 14px; padding: 1rem; margin-bottom: 1rem; border: 1px solid #E5E7EB;">
      <div style="font-size: 11px; font-weight: 600; color: #6B7280; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px;">昨日收盤價</div>
      <div id="inputs-container" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px;"></div>
      
      <div style="display: flex; align-items: center; gap: 8px;">
        <span style="font-size: 12px; color: #6B7280; font-weight: 500;">彈藥預算：</span>
        <div id="budget-toggle" style="display: flex; background: #E5E7EB; border-radius: 8px; padding: 2px;"></div>
      </div>
    </div>

    <div id="allocation-container"></div>
    <div id="cards-container"></div>
    <div id="strategy-container"></div>

    <div style="font-size: 10px; color: #D1D5DB; margin-top: 14px; line-height: 1.6;">
      限價公式：昨收 × (1 − 觸發% + 1.5%) · 每次收盤後重新輸入最新收盤價更新 · 非投資建議
    </div>
  </div>

  <script>
    // --- 1. 常數設定 (Constants) ---
    const LEVEL_CONFIG = {
      lv1: { pct: 3.1, buf: 1.5, label: "正常修正", desc: "外資調節、消息面", dotColor: "#F59E0B", tagBg: "#FEF3C7", tagColor: "#92400E" },
      lv2: { pct: 5.1, buf: 1.5, label: "市場恐慌", desc: "升息、地緣衝擊", dotColor: "#EF4444", tagBg: "#FEE2E2", tagColor: "#991B1B" },
      lv3: { pct: 7.1, buf: 1.5, label: "重度崩跌", desc: "系統性崩盤", dotColor: "#7F1D1D", tagBg: "#7F1D1D", tagColor: "#FCA5A5" },
    };

    const ETF_META = {
      "0050":   { name: "元大台灣50",   role: "成長",   accent: "#2563EB", light: "#EFF6FF" },
      "00878":  { name: "國泰永續高息", role: "領息",   accent: "#059669", light: "#ECFDF5" },
      "00991A": { name: "復華未來50",   role: "衛星",   accent: "#7C3AED", light: "#F5F3FF" },
    };

    const BUDGET_ORDERS = {
      "1wan": [
        { id: "A", etf: "0050",   level: "lv1", amount: 3500, purpose: "成長卡位" },
        { id: "B", etf: "00878",  level: "lv1", amount: 2000, purpose: "領息防守" },
        { id: "C", etf: "0050",   level: "lv2", amount: 2500, purpose: "成長加碼" },
        { id: "D", etf: "00878",  level: "lv2", amount: 2000, purpose: "領息加深" },
      ],
      "2wan": [
        { id: "A", etf: "0050",   level: "lv1", amount: 6000, purpose: "成長核心" },
        { id: "B", etf: "00878",  level: "lv1", amount: 3000, purpose: "領息防守" },
        { id: "C", etf: "0050",   level: "lv2", amount: 4000, purpose: "成長加碼" },
        { id: "D", etf: "00878",  level: "lv2", amount: 3000, purpose: "領息加深" },
        { id: "E", etf: "0050",   level: "lv3", amount: 2000, purpose: "成長重壓" },
        { id: "F", etf: "00991A", level: "lv3", amount: 2000, purpose: "衛星超跌" },
      ],
    };

    const fmt = (n) => parseFloat(n).toFixed(2);
    const fmtNT = (n) => `NT$${Math.round(n).toLocaleString()}`;

    // --- 2. 狀態管理 (State) ---
    let state = {
      prices: { "0050": "", "00878": "", "00991A": "" },
      budget: "1wan"
    };

    // --- 3. 邏輯計算 (Equivalent to useMemo) ---
    function getComputed() {
      return BUDGET_ORDERS[state.budget].map(o => {
        const close = parseFloat(state.prices[o.etf]);
        if (!close || close <= 0) return { ...o, ready: false };
        const lv = LEVEL_CONFIG[o.level];
        const triggerMult = 1 - lv.pct / 100;
        const limitMult   = 1 - (lv.pct - lv.buf) / 100;
        const triggerPrice = close * triggerMult;
        const limitPrice   = close * limitMult;
        const shares = Math.floor(o.amount / limitPrice);
        return { ...o, ready: true, close, triggerPrice: fmt(triggerPrice), limitPrice: fmt(limitPrice), shares, approxCost: Math.round(shares * limitPrice) };
      });
    }

    function getSplit() {
      const g = BUDGET_ORDERS[state.budget].filter(o => o.etf === "0050").reduce((s, o) => s + o.amount, 0);
      const i = BUDGET_ORDERS[state.budget].filter(o => o.etf === "00878").reduce((s, o) => s + o.amount, 0);
      const v = BUDGET_ORDERS[state.budget].filter(o => o.etf === "00991A").reduce((s, o) => s + o.amount, 0);
      return { g, i, v, total: g + i + v };
    }

    // --- 4. 初始化與靜態綁定 ---
    function initUI() {
      // 渲染輸入框 (只渲染一次，避免輸入時失焦)
      const inputsContainer = document.getElementById('inputs-container');
      Object.entries(ETF_META).forEach(([code, meta]) => {
        const wrapper = document.createElement('div');
        wrapper.innerHTML = `
          <div style="display: flex; align-items: center; gap: 4px; margin-bottom: 5px;">
            <span style="width: 7px; height: 7px; border-radius: 2px; background: ${meta.accent}; flex-shrink: 0;"></span>
            <span style="font-size: 12px; font-weight: 600; color: ${meta.accent};">${code}</span>
          </div>
          <input type="number" step="0.01" placeholder="昨收" id="input-${code}"
            style="width: 100%; padding: 7px 8px; border-radius: 8px; border: 1.5px solid #D1D5DB; font-size: 15px; font-weight: 600; outline: none; background: #fff; color: #111; transition: border-color 0.15s; box-sizing: border-box;"
          />
        `;
        inputsContainer.appendChild(wrapper);

        const inputEl = document.getElementById(`input-${code}`);
        inputEl.addEventListener('input', (e) => {
          state.prices[code] = e.target.value;
          // 動態更新輸入框的樣式
          inputEl.style.borderColor = e.target.value ? meta.accent : '#D1D5DB';
          inputEl.style.backgroundColor = e.target.value ? meta.light : '#fff';
          updateDynamicUI(); // 觸發畫面更新
        });
      });

      // 渲染預算按鈕
      const budgetToggle = document.getElementById('budget-toggle');
      const budgets = [["1wan", "1 萬"], ["2wan", "2 萬"]];
      budgets.forEach(([val, label]) => {
        const btn = document.createElement('button');
        btn.textContent = label;
        btn.id = `btn-${val}`;
        btn.style.cssText = "padding: 5px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.15s;";
        
        btn.addEventListener('click', () => {
          state.budget = val;
          updateBudgetStyles();
          updateDynamicUI(); // 觸發畫面更新
        });
        budgetToggle.appendChild(btn);
      });

      updateBudgetStyles();
      updateDynamicUI(); // 初始渲染
    }

    // 更新預算按鈕的樣式
    function updateBudgetStyles() {
      ["1wan", "2wan"].forEach(val => {
        const btn = document.getElementById(`btn-${val}`);
        if (state.budget === val) {
          btn.style.background = "#fff";
          btn.style.color = "#111";
          btn.style.boxShadow = "0 1px 3px rgba(0,0,0,.12)";
        } else {
          btn.style.background = "transparent";
          btn.style.color = "#9CA3AF";
          btn.style.boxShadow = "none";
        }
      });
    }

    // --- 5. 動態渲染 (Equivalent to React Rendering) ---
    function updateDynamicUI() {
      const computed = getComputed();
      const split = getSplit();
      const someReady = computed.some(o => o.ready);

      // 更新資金配置 Bar
      document.getElementById('allocation-container').innerHTML = `
        <div style="background: #F9FAFB; border-radius: 10px; padding: 10px 12px; margin-bottom: 1rem; border: 1px solid #E5E7EB;">
          <div style="display: flex; justify-content: space-between; font-size: 11px; color: #6B7280; margin-bottom: 6px;">
            <span style="font-weight: 600;">資金配置（共 ${fmtNT(split.total)}）</span>
            <span>成長 ${Math.round(split.g/split.total*100)}% ／ 領息+衛星 ${Math.round((split.i+split.v)/split.total*100)}%</span>
          </div>
          <div style="display: flex; height: 8px; border-radius: 4px; overflow: hidden; gap: 1px;">
            <div style="flex: ${split.g}; background: #2563EB; border-radius: 4px 0 0 4px;"></div>
            <div style="flex: ${split.i}; background: #059669;"></div>
            ${split.v > 0 ? `<div style="flex: ${split.v}; background: #7C3AED; border-radius: 0 4px 4px 0;"></div>` : ''}
          </div>
          <div style="display: flex; gap: 12px; margin-top: 5px; font-size: 11px; color: #6B7280;">
            <span>● 0050 ${fmtNT(split.g)}</span>
            <span>● 00878 ${fmtNT(split.i)}</span>
            ${split.v > 0 ? `<span>● 00991A ${fmtNT(split.v)}</span>` : ''}
          </div>
        </div>
      `;

      // 更新下方卡片與狀態
      const cardsContainer = document.getElementById('cards-container');
      const strategyContainer = document.getElementById('strategy-container');

      if (!someReady) {
        cardsContainer.innerHTML = `
          <div style="text-align: center; padding: 2.5rem 1rem; color: #9CA3AF; font-size: 13px; background: #F9FAFB; border-radius: 14px; border: 1.5px dashed #D1D5DB;">
            ↑ 輸入昨日收盤價後自動產生設定
          </div>
        `;
        strategyContainer.innerHTML = '';
      } else {
        cardsContainer.innerHTML = computed.map(o => {
          const lv = LEVEL_CONFIG[o.level];
          const meta = ETF_META[o.etf];
          
          if (o.ready) {
            return `
            <div style="background: #fff; border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; border: 1px solid #E5E7EB; border-left: 3px solid ${meta.accent};">
              <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
                <span style="width: 24px; height: 24px; border-radius: 50%; background: ${meta.light}; color: ${meta.accent}; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0;">${o.id}</span>
                <span style="font-size: 16px; font-weight: 700; color: #111;">${o.etf}</span>
                <span style="font-size: 11px; color: ${meta.accent}; background: ${meta.light}; padding: 1px 7px; border-radius: 4px; font-weight: 500;">${o.purpose}</span>
                <span style="margin-left: auto; font-size: 10px; padding: 2px 7px; border-radius: 4px; background: ${lv.tagBg}; color: ${lv.tagColor}; font-weight: 600;">${lv.label}</span>
              </div>
              <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 8px;">
                <div style="background: #F3F4F6; border-radius: 8px; padding: 8px 10px;">
                  <div style="font-size: 10px; color: #9CA3AF; margin-bottom: 2px;">觸發跌幅</div>
                  <div style="font-size: 16px; font-weight: 700; color: ${lv.dotColor};">≥${lv.pct}%</div>
                </div>
                <div style="background: ${lv.tagBg}; border-radius: 8px; padding: 8px 10px;">
                  <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div style="font-size: 10px; color: ${lv.tagColor}; margin-bottom: 2px; opacity: .8;">⭐ 限價</div>
                    <button class="copy-btn" data-copy="${o.limitPrice}" style="font-size: 10px; padding: 2px 7px; border-radius: 4px; border: none; cursor: pointer; background: #E5E7EB; color: #6B7280; transition: all 0.15s;">複製</button>
                  </div>
                  <div style="font-size: 16px; font-weight: 700; color: ${lv.tagColor}; font-family: monospace;">${o.limitPrice}</div>
                </div>
                <div style="background: ${meta.light}; border-radius: 8px; padding: 8px 10px;">
                  <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div style="font-size: 10px; color: ${meta.accent}; margin-bottom: 2px; opacity: .8;">⭐ 零股數</div>
                    <button class="copy-btn" data-copy="${o.shares}" style="font-size: 10px; padding: 2px 7px; border-radius: 4px; border: none; cursor: pointer; background: #E5E7EB; color: #6B7280; transition: all 0.15s;">複製</button>
                  </div>
                  <div style="font-size: 16px; font-weight: 700; color: ${meta.accent}; font-family: monospace;">${o.shares}<span style="font-size: 11px; font-weight: 400;"> 股</span></div>
                </div>
              </div>
              <div style="display: flex; justify-content: space-between; font-size: 11px; color: #9CA3AF;">
                <span>觸發時市場價 ≤ ${o.triggerPrice}</span>
                <span>預計花費 ≒ ${fmtNT(o.approxCost)}</span>
                <span style="color: #DC2626; font-weight: 600;">限一次 ✓</span>
              </div>
            </div>`;
          } else {
            return `
            <div style="background: #fff; border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; border: 1px solid #E5E7EB; border-left: 3px solid ${meta.accent}; opacity: 0.5;">
              <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
                <span style="width: 24px; height: 24px; border-radius: 50%; background: ${meta.light}; color: ${meta.accent}; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0;">${o.id}</span>
                <span style="font-size: 16px; font-weight: 700; color: #111;">${o.etf}</span>
                <span style="font-size: 11px; color: ${meta.accent}; background: ${meta.light}; padding: 1px 7px; border-radius: 4px; font-weight: 500;">${o.purpose}</span>
                <span style="margin-left: auto; font-size: 10px; padding: 2px 7px; border-radius: 4px; background: ${lv.tagBg}; color: ${lv.tagColor}; font-weight: 600;">${lv.label}</span>
              </div>
              <div style="font-size: 12px; color: #9CA3AF; text-align: center; padding: 8px 0;">
                請輸入 ${o.etf} 昨日收盤價
              </div>
            </div>`;
          }
        }).join('');

        strategyContainer.innerHTML = `
          <div style="background: #EFF6FF; border-radius: 10px; padding: 10px 12px; margin-top: 4px; border-left: 3px solid #2563EB;">
            <div style="font-size: 12px; color: #1E40AF; font-weight: 600; margin-bottom: 3px;">💡 策略邏輯</div>
            <div style="font-size: 11px; color: #3B82F6; line-height: 1.7;">
              市場小跌（-3.1%）→ 先買成長（0050）<br/>
              市場恐慌（-5.1%）→ 成長 + 領息同步進場<br/>
              重度崩跌（-7.1%）→ 全力部署，含衛星超跌
            </div>
          </div>
        `;
      }

      // 重新綁定複製按鈕事件
      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const text = e.target.getAttribute('data-copy');
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => {
              btn.textContent = "✓ 已複製";
              btn.style.background = "#059669";
              btn.style.color = "#fff";
              setTimeout(() => {
                btn.textContent = "複製";
                btn.style.background = "#E5E7EB";
                btn.style.color = "#6B7280";
              }, 1500);
            });
          }
        });
      });
    }

    // --- 啟動 ---
    initUI();
  </script>
</body>
</html>
